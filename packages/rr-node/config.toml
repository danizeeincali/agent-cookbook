# R&R Node Configuration

[cluster]
node_id = "node-1"
members = ["node-1:3000", "node-2:3000", "node-3:3000"]
replication_factor = 3
sync_mode = "semi-sync"
min_replicas = 2

[raft]
election_timeout_min_ms = 150
election_timeout_max_ms = 300
heartbeat_interval_ms = 50

[server]
host = "0.0.0.0"
port = 3000
data_dir = "./data"
